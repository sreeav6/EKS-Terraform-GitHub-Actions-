name: Docker

on:
  push:
    branches:
      - main
    paths:
      - "app/**"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/simpletimeservice

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag with both the short commit SHA (immutable, traceable)
      # and `latest` (convenience pointer for the terraform.tfvars default).
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Cache layers between runs to speed up rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }}:${{ github.sha }}"
